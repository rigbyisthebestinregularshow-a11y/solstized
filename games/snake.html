<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0015; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:'Segoe UI',sans-serif; color:#f4b8de; }
h1 { font-size:28px; margin-bottom:8px; letter-spacing:2px; }
#score { font-size:14px; color:rgba(255,180,230,0.5); margin-bottom:16px; letter-spacing:1px; }
canvas { border:1px solid rgba(255,140,210,0.3); border-radius:8px; background:#0a0010; }
#msg { margin-top:16px; font-size:13px; color:rgba(255,180,230,0.5); letter-spacing:1px; }
</style>
</head>
<body>
<h1>snake</h1>
<div id="score">score: 0 &nbsp;|&nbsp; best: 0</div>
<canvas id="c" width="400" height="400"></canvas>
<div id="msg">arrow keys or wasd to move</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const CELL = 20, COLS = 20, ROWS = 20;
let snake, dir, next, food, score, best = 0, alive, loop;

function init() {
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; next = {x:1,y:0};
  food = randFood(); score = 0; alive = true;
  document.getElementById('msg').textContent = 'arrow keys or wasd to move';
  clearInterval(loop); loop = setInterval(tick, 120);
}

function randFood() {
  let f;
  do { f = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===f.x && s.y===f.y));
  return f;
}

function tick() {
  dir = next;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    alive = false; clearInterval(loop);
    document.getElementById('msg').textContent = 'game over — press space to restart';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score++; if(score>best) best=score;
    document.getElementById('score').textContent = `score: ${score} | best: ${best}`;
    food = randFood();
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = '#0a0010'; ctx.fillRect(0,0,c.width,c.height);
  // grid dots
  ctx.fillStyle = 'rgba(255,140,210,0.05)';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) { ctx.fillRect(x*CELL+9,y*CELL+9,2,2); }
  // food
  ctx.fillStyle = '#f4b8de';
  ctx.shadowColor = '#f4b8de'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-3,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // snake
  snake.forEach((s,i) => {
    const t = 1 - i/snake.length;
    ctx.fillStyle = `rgba(196,79,160,${0.4+t*0.6})`;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2, 4);
    ctx.fill();
  });
}

document.addEventListener('keydown', e => {
  if(!alive && e.code==='Space') { init(); return; }
  const k = e.key;
  if((k==='ArrowUp'||k==='w')&&dir.y!==1)   next={x:0,y:-1};
  if((k==='ArrowDown'||k==='s')&&dir.y!==-1) next={x:0,y:1};
  if((k==='ArrowLeft'||k==='a')&&dir.x!==1)  next={x:-1,y:0};
  if((k==='ArrowRight'||k==='d')&&dir.x!==-1)next={x:1,y:0};
});

// mobile swipe
let tx,ty;
c.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
c.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)next={x:1,y:0};else if(dir.x!==1)next={x:-1,y:0};}
  else{if(dy>0&&dir.y!==-1)next={x:0,y:1};else if(dir.y!==1)next={x:0,y:-1};}
},{passive:true});

init(); draw();
</script>
</body>
</html>
