<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flappy Bird</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d0015;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#f4b8de;}
canvas{border:1px solid rgba(255,140,210,0.3);border-radius:8px;cursor:pointer;}
#msg{margin-top:12px;font-size:13px;color:rgba(255,180,230,0.5);letter-spacing:1px;}
</style>
</head>
<body>
<canvas id="c" width="320" height="480"></canvas>
<div id="msg">click or space to flap</div>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=320,H=480,PIPE_W=52,GAP=140,PIPE_SPEED=2.5,GRAVITY=0.35,JUMP=-7;
let bird,pipes,score,best=0,state='wait',frame=0;

function init(){
  bird={x:80,y:H/2,vy:0,r:14};
  pipes=[];score=0;frame=0;
  addPipe();
}

function addPipe(){
  const top=60+Math.random()*(H-GAP-120);
  pipes.push({x:W,top,bottom:top+GAP});
}

function flap(){
  if(state==='wait'||state==='dead'){state='play';init();}
  bird.vy=JUMP;
}

function tick(){
  if(state!=='play')return;
  frame++;
  bird.vy+=GRAVITY;bird.y+=bird.vy;
  if(bird.y-bird.r<0){bird.y=bird.r;bird.vy=0;}
  if(bird.y+bird.r>H){die();return;}
  pipes.forEach(p=>p.x-=PIPE_SPEED);
  pipes=pipes.filter(p=>p.x>-PIPE_W);
  if(pipes.length===0||pipes[pipes.length-1].x<W-200)addPipe();
  pipes.forEach(p=>{
    if(!p.passed&&p.x+PIPE_W<bird.x){p.passed=true;score++;if(score>best)best=score;}
    if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+PIPE_W&&(bird.y-bird.r<p.top||bird.y+bird.r>p.bottom))die();
  });
}

function die(){state='dead';document.getElementById('msg').textContent=`score: ${score} | best: ${best} — click to retry`;}

function draw(){
  // sky
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d0015');g.addColorStop(1,'#1a0520');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // stars
  ctx.fillStyle='rgba(255,214,240,0.6)';
  for(let i=0;i<40;i++){const s=Math.sin(i*127.1+frame*0.02)*0.5+0.5;ctx.globalAlpha=s*0.5;ctx.fillRect((i*137)%W,(i*91)%H,1,1);}
  ctx.globalAlpha=1;
  // pipes
  pipes.forEach(p=>{
    ctx.fillStyle='#3aaa66';
    ctx.shadowColor='#3aaa66';ctx.shadowBlur=12;
    ctx.beginPath();ctx.roundRect(p.x,0,PIPE_W,p.top,4);ctx.fill();
    ctx.beginPath();ctx.roundRect(p.x,p.bottom,PIPE_W,H-p.bottom,4);ctx.fill();
    ctx.shadowBlur=0;
  });
  // bird
  ctx.save();ctx.translate(bird.x,bird.y);
  ctx.rotate(Math.min(Math.max(bird.vy*0.06,-0.4),0.8));
  ctx.fillStyle='#f4b8de';ctx.shadowColor='#c44fa0';ctx.shadowBlur=16;
  ctx.beginPath();ctx.ellipse(0,0,bird.r,bird.r*0.8,0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // eye
  ctx.fillStyle='#1a0520';ctx.beginPath();ctx.arc(6,-4,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(7,-5,1.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // score
  ctx.fillStyle='#f4b8de';ctx.font='bold 28px Segoe UI';ctx.textAlign='center';ctx.shadowColor='#c44fa0';ctx.shadowBlur=10;
  ctx.fillText(score,W/2,50);ctx.shadowBlur=0;
  if(state==='wait'){
    ctx.fillStyle='rgba(244,184,222,0.8)';ctx.font='16px Segoe UI';
    ctx.fillText('tap to start',W/2,H/2+40);
  }
}

function loop(){tick();draw();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});
c.addEventListener('click',flap);
c.addEventListener('touchstart',e=>{e.preventDefault();flap();},{passive:false});

state='wait';init();loop();
</script>
</body>
</html>
